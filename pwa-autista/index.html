<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Doxy Autista">
  <meta name="theme-color" content="#0d6efd">
  <title>Doxy Autista</title>
  <link rel="manifest" href="/pwa/autista/manifest.json">
  <link rel="apple-touch-icon" href="/pwa/autista/icon.svg">
  <link rel="stylesheet" href="/pwa/autista/style.css">
</head>
<body>

<!-- Header (visibile solo in screenMain) -->
<header class="app-header" id="appHeader" style="display:none">
  <h1>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
         style="margin-right:6px;vertical-align:-.15em" viewBox="0 0 16 16">
      <path d="M3.904 1.777C4.978 1.289 6.427 1 8 1s3.022.289 4.096.777C13.125 2.245 14 2.993 14 4s-.875 1.755-1.904 2.223C11.022 6.711 9.573 7 8 7s-3.022-.289-4.096-.777C2.875 5.755 2 5.007 2 4s.875-1.755 1.904-2.223"/>
      <path d="M2 6.161V7c0 1.007.875 1.755 1.904 2.223C4.978 9.71 6.427 10 8 10s3.022-.29 4.096-.777C13.125 8.755 14 8.007 14 7v-.839c-.457.432-1.004.751-1.49.972C11.278 7.684 9.682 8 8 8s-3.278-.316-4.51-.867c-.486-.22-1.033-.54-1.49-.972"/>
      <path d="M2 9.161V10c0 1.007.875 1.755 1.904 2.223C4.978 12.711 6.427 13 8 13s3.022-.289 4.096-.777C13.125 11.755 14 11.007 14 10v-.839c-.457.432-1.004.751-1.49.972C11.278 10.684 9.682 11 8 11s-3.278-.316-4.51-.867c-.486-.22-1.033-.54-1.49-.972"/>
      <path d="M2 12.161V13c0 1.007.875 1.755 1.904 2.223C4.978 15.711 6.427 16 8 16s3.022-.289 4.096-.777C13.125 14.755 14 14.007 14 13v-.839c-.457.432-1.004.751-1.49.972C11.278 13.684 9.682 14 8 14s-3.278-.316-4.51-.867c-.486-.22-1.033-.54-1.49-.972"/>
    </svg>
    Doxy Autista
  </h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="user-info" id="headerUser"></span>
    <button class="btn-logout" id="btnLogout">Esci</button>
  </div>
</header>

<!-- ── Schermata Login ─────────────────────────────────────────────────── -->
<div class="screen" id="screenLogin">
  <div class="logo-wrap">
    <div class="logo-circle">
      <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" fill="white" viewBox="0 0 16 16">
        <path d="M3.904 1.777C4.978 1.289 6.427 1 8 1s3.022.289 4.096.777C13.125 2.245 14 2.993 14 4s-.875 1.755-1.904 2.223C11.022 6.711 9.573 7 8 7s-3.022-.289-4.096-.777C2.875 5.755 2 5.007 2 4s.875-1.755 1.904-2.223"/>
        <path d="M2 6.161V7c0 1.007.875 1.755 1.904 2.223C4.978 9.71 6.427 10 8 10s3.022-.29 4.096-.777C13.125 8.755 14 8.007 14 7v-.839c-.457.432-1.004.751-1.49.972C11.278 7.684 9.682 8 8 8s-3.278-.316-4.51-.867c-.486-.22-1.033-.54-1.49-.972"/>
        <path d="M2 9.161V10c0 1.007.875 1.755 1.904 2.223C4.978 12.711 6.427 13 8 13s3.022-.289 4.096-.777C13.125 11.755 14 11.007 14 10v-.839c-.457.432-1.004.751-1.49.972C11.278 10.684 9.682 11 8 11s-3.278-.316-4.51-.867c-.486-.22-1.033-.54-1.49-.972"/>
        <path d="M2 12.161V13c0 1.007.875 1.755 1.904 2.223C4.978 15.711 6.427 16 8 16s3.022-.289 4.096-.777C13.125 14.755 14 14.007 14 13v-.839c-.457.432-1.004.751-1.49.972C11.278 13.684 9.682 14 8 14s-3.278-.316-4.51-.867c-.486-.22-1.033-.54-1.49-.972"/>
      </svg>
    </div>
    <div class="app-name">Doxy Autista</div>
    <div class="app-sub">Segnala problemi ai veicoli</div>
  </div>

  <div class="card">
    <div id="loginAlert"></div>
    <form id="formLogin" novalidate>
      <div class="form-group">
        <label for="loginEmail">Email <span class="required">*</span></label>
        <input type="email" class="form-control" id="loginEmail"
               placeholder="la-tua@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="loginPassword">Password <span class="required">*</span></label>
        <input type="password" class="form-control" id="loginPassword"
               placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="btnLogin">Accedi</button>
    </form>
    <p class="text-muted text-center">
      Non hai un account?
      <span class="text-link" id="btnGoRegister">Registrati</span>
    </p>
  </div>
</div>

<!-- ── Schermata Registrazione ───────────────────────────────────────────── -->
<div class="screen" id="screenRegister">
  <div class="card">
    <div class="card-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M6 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H1s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C9.516 10.68 8.384 10.5 7 10.5s-2.516.18-3.168.832C3.154 12.01 3.001 12.75 3 13z"/>
        <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5"/>
      </svg>
      Crea Account
    </div>
    <div id="registerAlert"></div>
    <form id="formRegister" novalidate>
      <div class="form-group">
        <label for="regNome">Nome <span class="required">*</span></label>
        <input type="text" class="form-control" id="regNome"
               placeholder="Mario" required autocomplete="given-name">
      </div>
      <div class="form-group">
        <label for="regCognome">Cognome <span class="required">*</span></label>
        <input type="text" class="form-control" id="regCognome"
               placeholder="Rossi" required autocomplete="family-name">
      </div>
      <div class="form-group">
        <label for="regEmail">Email <span class="required">*</span></label>
        <input type="email" class="form-control" id="regEmail"
               placeholder="email@esempio.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="regPassword">Password <span class="required">*</span></label>
        <input type="password" class="form-control" id="regPassword"
               placeholder="Scegli una password" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="regTelefono">Telefono</label>
        <input type="tel" class="form-control" id="regTelefono"
               placeholder="+39 333 0000000" autocomplete="tel">
      </div>
      <button type="submit" class="btn btn-primary" id="btnRegister">Crea Account</button>
      <button type="button" class="btn btn-outline" id="btnGoLogin">
        Ho già un account
      </button>
    </form>
  </div>
</div>

<!-- ── Schermata Principale ──────────────────────────────────────────────── -->
<div class="screen" id="screenMain">
  <div class="card">
    <div class="card-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10h14V4zM2 5h12v8H2z"/>
      </svg>
      Nuova Segnalazione
    </div>
    <div id="segnAlert"></div>
    <form id="formSegnalazione" novalidate>
      <div class="form-group">
        <label for="segnVeicolo">Veicolo <span class="required">*</span></label>
        <select class="form-control" id="segnVeicolo" required>
          <option value="">— Seleziona veicolo —</option>
        </select>
      </div>
      <div class="form-group">
        <label for="segnDescrizione">Descrizione problema <span class="required">*</span></label>
        <textarea class="form-control" id="segnDescrizione"
                  placeholder="Descrivi il problema riscontrato..." required></textarea>
      </div>
      <div class="form-group">
        <label for="segnFoto">Foto (opzionale)</label>
        <input type="file" class="form-control" id="segnFoto"
               accept="image/*" capture="environment">
        <img id="fotoPreview" class="foto-preview" alt="Anteprima foto">
      </div>
      <button type="submit" class="btn btn-primary" id="btnInvia">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="currentColor" viewBox="0 0 16 16">
          <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083zm-1.833 1.89L6.637 10.07l-.215-.338L1.32 6.32l13.524-4.668zM5.932 10.909l.216.338L8.948 15.31l-1.63-5.22z"/>
        </svg>
        Invia Segnalazione
      </button>
    </form>
  </div>
</div>

<script src="/pwa/autista/app.js"></script>
</body>
</html>
